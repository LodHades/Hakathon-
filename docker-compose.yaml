services:
  postgres-db:
    image: postgres:15
    container_name: data-analyst-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ./.vols/postgres_data:/var/lib/postgresql/data

  mcp-data:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    container_name: data-mcp
    ports:
      - "8765:8765"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8765/sse')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: data-analyst-api
    depends_on:
      postgres-db:
        condition: service_healthy
      mcp-data:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      DEEP_SEEK_API_KEY: ${DEEP_SEEK_API_KEY}

      # Postgres objetivo que el analyst consulta
      DATA_DB_URL: postgresql+asyncpg://${DB_USER}:${DB_PASS}@postgres-db:5432/${DB_NAME}

      # MCP data server (en docker: SSE)
      MCP_DATA_TRANSPORT: sse
      MCP_DATA_URL: http://mcp-data:8765/sse

      # MCPs externos (Snowflake / BigQuery) opcionales vía .env
      MCP_SNOWFLAKE_ENABLED: ${MCP_SNOWFLAKE_ENABLED:-false}
      MCP_SNOWFLAKE_TRANSPORT: ${MCP_SNOWFLAKE_TRANSPORT:-stdio}
      MCP_SNOWFLAKE_COMMAND: ${MCP_SNOWFLAKE_COMMAND:-uvx}
      MCP_SNOWFLAKE_ARGS: ${MCP_SNOWFLAKE_ARGS:-mcp-server-snowflake}
      MCP_SNOWFLAKE_URL: ${MCP_SNOWFLAKE_URL:-}

      MCP_BIGQUERY_ENABLED: ${MCP_BIGQUERY_ENABLED:-false}
      MCP_BIGQUERY_TRANSPORT: ${MCP_BIGQUERY_TRANSPORT:-stdio}
      MCP_BIGQUERY_COMMAND: ${MCP_BIGQUERY_COMMAND:-uvx}
      MCP_BIGQUERY_ARGS: ${MCP_BIGQUERY_ARGS:-mcp-server-bigquery}
      MCP_BIGQUERY_URL: ${MCP_BIGQUERY_URL:-}

      # Credenciales heredadas a subprocesos (stdio)
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT:-}
      SNOWFLAKE_USER: ${SNOWFLAKE_USER:-}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD:-}
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE:-}
      SNOWFLAKE_DATABASE: ${SNOWFLAKE_DATABASE:-}

      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}

      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_COPILOTKIT_URL: http://localhost:8000/copilotkit
        VITE_AGENT_NAME: data_supervisor
    container_name: data-analyst-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
